name: Build Android APK
on:
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # We will need to set this up later, but we can do a local web build first if easier!

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: eas build -p android --profile preview --local
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AdkaAuto-APK
          path: build/*.apk
