name: Build Android APK
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} 

      - name: Install dependencies
        run: npm install

      - name: Create eas.json
        run: |
          echo '{
            "cli": { "version": ">= 9.0.0", "appVersionSource": "remote" },
            "build": { "preview": { "android": { "buildType": "apk" } } }
          }' > eas.json

      - name: Build APK on Expo Servers
        run: eas build -p android --profile preview --non-interactive
